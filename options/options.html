<!doctype html>
<html lang="th">
    <head>
        <meta charset="utf-8" />
        <title>Claude Usage — ตั้งค่า</title>
        <link rel="stylesheet" href="options.css" />
    </head>
    <body>
        <div class="page">
            <header class="page-header">
                <span class="brand-dot" aria-hidden="true"></span>
                <span class="brand-text">CLAUDE USAGE — SETTINGS</span>
            </header>

            <section class="card">
                <div class="card-row">
                    <div class="card-text">
                        <div class="card-title">การแจ้งเตือน</div>
                        <div class="card-desc">
                            เด้งแจ้งเตือนเมื่อโควตาใกล้เต็ม
                        </div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="notify-toggle" />
                        <span class="switch-track" aria-hidden="true">
                            <span class="switch-thumb"></span>
                        </span>
                    </label>
                </div>
            </section>

            <section class="card" id="threshold-card">
                <div class="card-title">เกณฑ์แจ้งเตือน</div>
                <div class="card-desc">
                    แจ้งเตือนเมื่อใช้โควตา 5 ชั่วโมงเกิน
                    <span id="threshold-value" class="threshold-value"
                        >95%</span
                    >
                </div>
                <input
                    type="range"
                    id="threshold-slider"
                    class="slider"
                    min="50"
                    max="99"
                    step="5"
                    value="95"
                />
                <div class="slider-scale">
                    <span>50%</span>
                    <span>99%</span>
                </div>
                <div class="card-note">
                    แจ้งเตือนแค่ครั้งเดียวต่อรอบ reset 5 ชั่วโมง ไม่สแปมซ้ำตอน %
                    ขยับขึ้นลงนิดหน่อย
                </div>
            </section>

            <div id="save-indicator" class="save-indicator">บันทึกแล้ว</div>

            <footer class="page-footer">Claude Usage Bars</footer>
        </div>
        <script src="options.js"></script>
    </body>
</html>
